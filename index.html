<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ПМЭФ'26 · Трекер сессий</title>
<style>
  :root{
    --ivory:#F7F5F0;
    --card:#FFFFFF;
    --ink:#1E2430;
    --ink-soft:#5C6472;
    --hair:#E4DFD4;
    --gold:#A98B4F;
    --gold-soft:#F1EADB;
    --navy:#2C4A7C;
    --sage:#5E7460;
    --sage-soft:#E9EFE9;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Georgia','Times New Roman',serif;
    background:var(--ivory);
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    padding-bottom:60px;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 16px}
  header{padding:36px 0 20px;border-bottom:1px solid var(--hair)}
  .eyebrow{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    font-size:11px;letter-spacing:.22em;text-transform:uppercase;
    color:var(--gold);margin-bottom:10px;
  }
  h1{font-size:26px;font-weight:normal;font-style:italic;line-height:1.25}
  .progress-line{
    display:flex;gap:20px;margin-top:18px;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    font-size:12px;color:var(--ink-soft);
  }
  .progress-line b{font-size:20px;font-weight:600;color:var(--ink);display:block;font-family:'Georgia',serif}
  .progress-line .g b{color:var(--gold)}
  .progress-line .s b{color:var(--sage)}
  .bar{height:3px;background:var(--hair);margin-top:14px;border-radius:2px;overflow:hidden;position:relative}
  .bar i{position:absolute;left:0;top:0;bottom:0;transition:width .4s ease}
  .bar .fill-l{background:var(--gold);opacity:.45}
  .bar .fill-w{background:var(--sage)}
  .filters{
    display:flex;gap:8px;padding:16px 0;overflow-x:auto;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  }
  .filters button{
    flex-shrink:0;border:1px solid var(--hair);background:transparent;
    color:var(--ink-soft);font-size:12px;padding:7px 14px;border-radius:20px;
    cursor:pointer;letter-spacing:.02em;
  }
  .filters button.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .track{margin-top:26px}
  .track-title{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--ink-soft);padding-bottom:8px;border-bottom:1px solid var(--hair);
    display:flex;justify-content:space-between;align-items:baseline;
  }
  .track-title span:last-child{letter-spacing:0;color:var(--gold)}
  .row{
    background:var(--card);border:1px solid var(--hair);border-radius:10px;
    margin-top:10px;padding:14px 14px 12px;
    transition:opacity .2s;
  }
  .row.done{border-color:var(--sage);background:linear-gradient(0deg,var(--sage-soft),var(--card))}
  .row.hidden{display:none}
  .row a{
    color:var(--ink);text-decoration:none;font-size:15px;line-height:1.45;display:block;
  }
  .row a:hover{color:var(--navy)}
  .row a::after{content:' ↗';font-size:11px;color:var(--gold)}
  .toggles{
    display:flex;gap:8px;margin-top:11px;
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
  }
  .tg{
    border:1px solid var(--hair);background:transparent;border-radius:6px;
    font-size:12px;padding:6px 12px;cursor:pointer;color:var(--ink-soft);
    letter-spacing:.02em;transition:all .15s;
  }
  .tg .mark{display:inline-block;width:12px;text-align:center;margin-right:4px;color:transparent}
  .tg.l.on{background:var(--gold-soft);border-color:var(--gold);color:#7A6234}
  .tg.w.on{background:var(--sage-soft);border-color:var(--sage);color:#3E5241}
  .tg.on .mark{color:inherit}
  .note{
    font-family:-apple-system,'Helvetica Neue',Arial,sans-serif;
    font-size:12px;color:var(--ink-soft);margin-top:34px;line-height:1.6;
    border-top:1px solid var(--hair);padding-top:14px;
  }
  .saving{
    position:fixed;bottom:18px;right:18px;background:var(--ink);color:#fff;
    font-family:-apple-system,sans-serif;font-size:11px;padding:6px 12px;border-radius:14px;
    opacity:0;transition:opacity .25s;pointer-events:none;
  }
  .saving.show{opacity:.85}
  @media(prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow">ПМЭФ'26 · Архитектура программы</div>
    <h1>Трекер отобранных сессий</h1>
    <div class="progress-line">
      <div><b id="cTotal">0</b>всего</div>
      <div class="g"><b id="cList">0</b>прослушано</div>
      <div class="s"><b id="cWork">0</b>отработано</div>
    </div>
    <div class="bar"><i class="fill-l" id="barL"></i><i class="fill-w" id="barW"></i></div>
  </header>

  <div class="filters" id="filters">
    <button data-f="all" class="on">Все</button>
    <button data-f="todo">Не начато</button>
    <button data-f="listened">Прослушано</button>
    <button data-f="worked">Отработано</button>
  </div>

  <main id="list"></main>

  <p class="note">Ссылка у каждой сессии открывает её поиск по forum-spb.ru — отдельные страницы сессий появятся с публикацией полной программы. Отметки сохраняются в браузере этого устройства автоматически.</p>
</div>
<div class="saving" id="saving">Сохранено</div>

<script>
const TRACKS = [
["Международная повестка",[

"Торговля в турбулентные времена",

"Редкие, стратегические: суверенитет и международное сотрудничество в области РЗМ и критических минералов",
"Международная электронная торговля: новые возможности или новые барьеры",

"Роль компаний в содействии международному развитию",
"Геополитика финансов",
"Технологическое партнерство со странами Глобального Юга для устойчивого развития",
"Роль стран ЕАЭС в формировании международных агропроизводственных рынков",
"Налоговые службы: создаем комфортную среду для бизнеса и прозрачность для государства",
"Россия – АТЭС: широкие перспективы сотрудничества на горизонте до 2035 года",
"Пересборка мировой финансовой системы",

"Экономика нового миропорядка: структурная трансформация, вызовы и возможности",
"Новые горизонты глобальной логистики и логистический контур Арктики",
"Будущее международных расчетов: платформы, ЦФА и ренессанс векселя"
]],
["Российская экономика",[
"Креативная экономика: конкуренция нарративов или объединение вокруг смыслов",
"Совершенствование инструментов поддержки добросовестного бизнеса и инвестиций в новых экономических реалиях",
"Банки и маркетплейсы: справедливая конкуренция на цифровых платформах",
"Драйверы роста: большие идеи от практиков бизнеса",
"Национальная модель торговли: архитектура роста, конкуренции и потребительского благополучия",

"Платформы: больше, чем бизнес",
"Российская юрисдикция: преимущества для иностранных инвесторов"
]],
["Социальная сфера",[
"Трансляция ценностей за рубежом: инструменты, практики и артефакты",
"Экономика участия. Когда помощь становится стратегией",
"Искусство как язык мира: 250-летие Большого театра и современные форматы культурной дипломатии"
]],
["Среда для жизни",[
"Права потребителя в цифровой экосистеме",
"Смена парадигмы потребления: от экономики впечатлений к экономике трансформаций",

"Культурный код как основа идентичности: российский опыт и перспективы"
]],
["Технологии, определяющие будущее",[
"Искусственный интеллект в креативных индустриях: национальные стратегии развития и границы применения",
"В борьбе за экономику и умы в эпоху ИИ",
"Когнитивный разрыв: как технологии меняют наше мышление и контуры экономики",
"От бита к мегаватту: как ИИ меняет энергетический ландшафт",
"Цифровой суверенитет под ключ: взаимовыгодные перспективы",
"Цифровая эволюция транспорта: как платформы меняют правила игры",
"Цифровое будущее: общие векторы развития, вызовы и решения",
"AI First, но не AI Only: новая операционная система мира",
"Международная кооперация: технологии без людей, как люди без технологий",
"Мегаустановки: новая физика международного сотрудничества",
"Ставка на опережение: глобальный ландшафт технологического лидерства",
"Человек – государство – бизнес: эволюция цифрового взаимодействия и развитие российских онлайн-платформ",
"Агентная экономика: новая архитектура рынков",
"Интеграция высоких технологий в развитие промышленного производства – импульс для индустриального роста",
"От больших данных к большим возможностям: данные как инструмент, формирующий экономику будущего",
"ИИ в новых материалах: кто заберет рынок"
]],
["Бизнес-диалоги",[
"Россия – Кыргызстан","Россия – Бразилия","Россия – Саудовская Аравия","ЕАЭС – АСЕАН",
"Россия – Индия","Россия – ОАЭ","Россия – Арабский мир","Россия – Китай",
"Россия – Африка","Россия – Латинская Америка","Россия – США","Россия – Таиланд"
]],
["B20 · ШОС · БРИКС",[
"Новый курс глобального бизнеса: инвестиции, инновации и открытые рынки (B20)",
"25 лет ШОС: новый этап развития торгово-экономической и деловой повестки",
"Новые драйверы делового партнерства внутри БРИКС"
]]
];

const STORAGE_KEY = 'pmef26-session-progress';
let state = {};
let filter = 'all';
let total = 0;

function idFor(title){
  let h = 0;
  for(let i=0;i<title.length;i++){h=((h<<5)-h+title.charCodeAt(i))|0}
  return 's'+Math.abs(h).toString(36);
}
function linkFor(title){
  const q = encodeURIComponent('"'+title+'" site:forum-spb.ru');
  return 'https://www.google.com/search?q='+q;
}

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) state = JSON.parse(raw);
  }catch(e){ state = {}; }
}
let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      const s=document.getElementById('saving');
      s.classList.add('show');
      setTimeout(()=>s.classList.remove('show'),900);
    }catch(e){ console.error('save failed',e); }
  },300);
}

function render(){
  const list=document.getElementById('list');
  list.innerHTML='';
  total=0;
  TRACKS.forEach(([track,items])=>{
    const sec=document.createElement('section');
    sec.className='track';
    const tt=document.createElement('div');
    tt.className='track-title';
    tt.innerHTML='<span>'+track+'</span><span>'+items.length+'</span>';
    sec.appendChild(tt);
    items.forEach(title=>{
      total++;
      const id=idFor(title);
      const st=state[id]||{l:false,w:false};
      const row=document.createElement('div');
      row.className='row'+(st.w?' done':'');
      row.dataset.id=id;
      row.innerHTML=
        '<a href="'+linkFor(title)+'" target="_blank" rel="noopener">'+title+'</a>'+
        '<div class="toggles">'+
        '<button class="tg l'+(st.l?' on':'')+'" data-k="l"><span class="mark">✓</span>Прослушано</button>'+
        '<button class="tg w'+(st.w?' on':'')+'" data-k="w"><span class="mark">✓</span>Отработано</button>'+
        '</div>';
      sec.appendChild(row);
    });
    list.appendChild(sec);
  });
  list.addEventListener('click',onToggle);
  applyFilter();
  updateCounters();
}

function onToggle(e){
  const btn=e.target.closest('.tg');
  if(!btn)return;
  const row=btn.closest('.row');
  const id=row.dataset.id;
  const k=btn.dataset.k;
  state[id]=state[id]||{l:false,w:false};
  state[id][k]=!state[id][k];
  btn.classList.toggle('on',state[id][k]);
  row.classList.toggle('done',state[id].w);
  saveState();
  updateCounters();
  applyFilter();
}

function updateCounters(){
  let l=0,w=0;
  Object.values(state).forEach(s=>{if(s.l)l++;if(s.w)w++;});
  document.getElementById('cTotal').textContent=total;
  document.getElementById('cList').textContent=l;
  document.getElementById('cWork').textContent=w;
  document.getElementById('barL').style.width=(total?100*l/total:0)+'%';
  document.getElementById('barW').style.width=(total?100*w/total:0)+'%';
}

function applyFilter(){
  document.querySelectorAll('.row').forEach(row=>{
    const s=state[row.dataset.id]||{l:false,w:false};
    let show=true;
    if(filter==='todo')show=!s.l&&!s.w;
    if(filter==='listened')show=s.l;
    if(filter==='worked')show=s.w;
    row.classList.toggle('hidden',!show);
  });
  document.querySelectorAll('.track').forEach(t=>{
    const visible=t.querySelectorAll('.row:not(.hidden)').length;
    t.style.display=visible?'':'none';
  });
}

document.getElementById('filters').addEventListener('click',e=>{
  const b=e.target.closest('button');
  if(!b)return;
  filter=b.dataset.f;
  document.querySelectorAll('#filters button').forEach(x=>x.classList.toggle('on',x===b));
  applyFilter();
});

loadState(); render();
</script>
</body>
</html>
